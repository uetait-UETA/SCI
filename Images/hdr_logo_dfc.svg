<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 790 550">
  <!-- White background -->
  <rect width="790" height="550" fill="white"/>

  <!-- Blue oval arc (from upper-right, sweeping left and around to lower-right) -->
  <path d="M 688 138 A 335 228 0 1 0 678 412"
        fill="none" stroke="#1B3875" stroke-width="36"
        stroke-linecap="round"/>

  <!-- DUTY FREE -->
